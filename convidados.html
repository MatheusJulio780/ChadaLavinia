<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista de Convidados - Floresta Encantada</title>
    <style>
        :root {
            --azul-bebe: #E0F2FE;
            --verde-bebe: #E8F5E9;
            --lilas-bebe: #cfa1a1;
            --lilas-escuro: #cfa1a1;
            --texto-principal: #4A4A4A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;500;600&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--azul-bebe), var(--verde-bebe), var(--lilas-bebe));
            background-size: 300% 300%;
            animation: gradientAnim 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden; 
            padding: 20px 0;
            position: relative;
        }

        /* ANIMAÇÃO DE FUNDO LEVE E FOFA (Luzes Flutuantes - Idêntica) */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.6) 0%, transparent 12%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.5) 0%, transparent 15%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4) 0%, transparent 20%);
            background-size: 150% 150%;
            animation: luzesMagicas 6s infinite alternate ease-in-out;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes luzesMagicas {
            0% { transform: scale(1) translateY(0); opacity: 0.6; }
            100% { transform: scale(1.05) translateY(-25px); opacity: 1; }
        }

        @keyframes gradientAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .cartao-convite {
            background: rgba(255, 255, 255, 0.95);
            width: 90%;
            max-width: 420px;
            min-height: 600px;
            border-radius: 24px;
            position: relative;
            box-shadow: 0 15px 35px rgba(142, 90, 145, 0.15);
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.8);
            opacity: 0;
            transform: scale(0.95) translateY(30px);
            animation: surgirCartao 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes surgirCartao {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .decoracao {
            position: absolute;
            z-index: 20; 
            pointer-events: none; 
            opacity: 0;
            animation: fadeDecoracao 1.5s ease forwards;
        }

        @keyframes fadeDecoracao {
            to { opacity: 1; }
        }

        .png-floral-topo { top: -20px; left: -20px; width: 140px; animation-delay: 0.5s; }
        .png-floral-base { bottom: -20px; right: -20px; width: 150px; animation-delay: 0.7s; }
        .png-fada-esquerda { top: 85%; left: -30px; width: 110px; animation: fadeDecoracao 1.5s ease forwards, flutuar 6s ease-in-out infinite alternate; animation-delay: 1s; }
        .png-fada-direita { top: 1%; right: -25px; width: 100px; animation: fadeDecoracao 1.5s ease forwards, flutuar 5s ease-in-out infinite alternate-reverse; animation-delay: 1.2s; }
        .png-borboleta { top: 5%; right: 60px; width: 60px; animation: fadeDecoracao 1.5s ease forwards, flutuarCampina 4s ease-in-out infinite alternate; animation-delay: 1.5s; }

        @keyframes flutuar { 0% { transform: translateY(0); } 100% { transform: translateY(-15px); } }
        @keyframes flutuarCampina { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(-20px) rotate(15deg); } }

        .animar-texto { opacity: 0; transform: translateY(15px); animation: subirTexto 0.8s ease forwards; }
        @keyframes subirTexto { to { opacity: 1; transform: translateY(0); } }

        .delay-1 { animation-delay: 0.8s; }
        .delay-2 { animation-delay: 1.1s; }
        .delay-3 { animation-delay: 1.4s; }

        .chamada {
            font-family: 'Montserrat', sans-serif; font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 2px; color: var(--texto-principal); margin: 40px 0 10px 0; z-index: 5;
        }

        .nome-bebe { font-family: 'Great Vibes', cursive; font-size: 3.8rem; color: var(--lilas-escuro); line-height: 1; margin-bottom: 25px; z-index: 5; }

        /* Bloco de Destaque para o Contador Total */
        .contador-bloco { 
            background: rgba(243, 229, 245, 0.6); 
            padding: 15px 20px; 
            border-radius: 12px; 
            width: 100%; 
            margin-bottom: 20px; 
            z-index: 5; 
            border: 1px solid rgba(142, 90, 145, 0.15);
            font-weight: 600;
            color: var(--texto-principal);
            font-size: 1.1rem;
        }
        .contador-bloco span {
            color: #6d8a60; /* Verde escuro para destacar o número */
            font-size: 1.4rem;
            font-weight: bold;
        }

        /* Container Rolável da Lista de Nomes (Evita estouro no layout mobile) */
        .lista-container {
            width: 100%;
            max-height: 280px;
            overflow-y: auto;
            z-index: 5;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        /* Estilização fina da barra de rolagem */
        .lista-container::-webkit-scrollbar { width: 5px; }
        .lista-container::-webkit-scrollbar-thumb { background: rgba(142, 90, 145, 0.2); border-radius: 10px; }

        /* Item Individual de Convidado */
        .convidado-item {
            background: rgba(255, 255, 255, 0.7);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            text-align: left;
            font-size: 0.9rem;
            color: var(--texto-principal);
            border-left: 4px solid #8DA881;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .convidado-data {
            font-size: 0.7rem;
            color: #999;
        }

        .btn-atualizar { background: linear-gradient(135deg, #A4C396, #8DA881); color: white; border: none; padding: 12px 25px; font-family: 'Montserrat', sans-serif; font-weight: 600; border-radius: 30px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; box-shadow: 0 5px 15px rgba(141, 168, 129, 0.4); transition: all 0.3s; z-index: 5; width: auto; }
        .btn-atualizar:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="cartao-convite">
        
        <img src="./floral-topo.png" class="decoracao png-floral-topo" alt="Floral Topo">
        <img src="./floral-base.png" class="decoracao png-floral-base" alt="Floral Base">
        <img src="./fada-esquerda.png" class="decoracao png-fada-esquerda" alt="Fada Esquerda">
        <img src="./fada-direita.png" class="decoracao png-fada-direita" alt="Fada Direita">
        <img src="./borboleta.png" class="decoracao png-borboleta" alt="Borboleta">
        
        <div class="chamada animar-texto delay-1">Chá de Bebê da Lavínia</div>
        <h1 class="nome-bebe animar-texto delay-1">Convidados</h1>

        <div class="contador-bloco animar-texto delay-2">
            Total Confirmado: <span id="totalContagem">0</span> pessoas
        </div>
        
        <div class="lista-container animar-texto delay-2" id="listaConvidados">
            <div style="color: #888; font-size: 0.9rem; padding: 20px;">Carregando lista...</div>
        </div>
        
        <button class="btn-atualizar animar-texto delay-3" onclick="obterLista()">🔄 Atualizar Lista</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Cole aqui exatamente o mesmo objeto que está no seu index.html
        const firebaseConfig = {
            apiKey: "AIzaSyB9NyBVa1Ha_42kwos09SV5VTN7NQWqHjM",
            authDomain: "tempero-da-casa-a2217.firebaseapp.com",
            projectId: "tempero-da-casa-a2217",
            storageBucket: "tempero-da-casa-a2217.firebasestorage.app",
            messagingSenderId: "92967322711",
            appId: "1:92967322711:web:88d151d9345f9191a8cf12"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const listaDiv = document.getElementById('listaConvidados');
        const totalSpan = document.getElementById('totalContagem');

        window.obterLista = async function() {
            listaDiv.innerHTML = '<div style="color: #888; font-size: 0.9rem; padding: 20px;">Atualizando...</div>';
            
            try {
                // Ordena por ordem de registro (os primeiros a confirmar aparecem no topo)
                const q = query(collection(db, "presencas_lavinia"), orderBy("dataRegistro", "asc"));
                const querySnapshot = await getDocs(q);
                
                listaDiv.innerHTML = '';
                let total = 0;
                
                if (querySnapshot.empty) {
                    listaDiv.innerHTML = '<div style="color: #888; font-size: 0.9rem; padding: 20px;">Ninguém confirmou presença ainda.</div>';
                    totalSpan.innerText = '0';
                    return;
                }
                
                querySnapshot.forEach((doc) => {
                    total++;
                    const dados = doc.data();
                    const nome = dados.nome;
                    
                    // Formatação da data/hora da confirmação
                    let dataFormatada = "";
                    if (dados.dataRegistro) {
                        const dataObjeto = dados.dataRegistro.toDate();
                        dataFormatada = dataObjeto.toLocaleDateString('pt-BR', {
                            day: '2-digit', 
                            month: '2-digit', 
                            hour: '2-digit', 
                            minute: '2-digit'
                        });
                    }

                    const item = document.createElement('div');
                    item.className = 'convidado-item';
                    item.innerHTML = `
                        <span><strong>${total}.</strong> ${nome}</span>
                        <span class="convidado-data">${dataFormatada}</span>
                    `;
                    listaDiv.appendChild(item);
                });
                
                totalSpan.innerText = total;
            } catch (error) {
                console.error("Erro ao ler dados:", error);
                listaDiv.innerHTML = '<div style="color: #c0392b; font-size: 0.9rem; padding: 20px;">Erro ao carregar convidados. Verifique o Firebase.</div>';
            }
        }

        // Executa automaticamente quando a página abre
        document.addEventListener('DOMContentLoaded', window.obterLista);
    </script>
</body>
</html>
